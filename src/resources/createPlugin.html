<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            padding: 30px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Ubuntu', sans-serif;
            background-color: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            margin: 0;
        }

        h2 {
            color: var(--vscode-titleBar-activeForeground);
            border-bottom: 2px solid var(--vscode-textLink-foreground);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--vscode-editor-background);
            padding: 25px;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--vscode-input-foreground);
        }

        input, select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--vscode-input-border);
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--vscode-focusBorder);
            box-shadow: 0 0 0 2px var(--vscode-focusBorder);
        }

        button {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background: var(--vscode-button-hoverBackground);
        }

        .required::after {
            content: " *";
            color: var(--vscode-errorForeground);
        }

        .form-section {
            background: var(--vscode-editor-background);
            border: 1px solid var(--vscode-input-border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .minecraft-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .minecraft-title {
            font-size: 28px;
            color: var(--vscode-textLink-foreground);
            margin: 0;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            font-size: 18px;
        }

        .input-with-icon {
            flex: 1;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--vscode-textLink-foreground);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--vscode-input-border);
            padding-bottom: 10px;
        }

        .tooltip {
            position: relative;
        }

        small {
            display: block;
            margin-top: 5px;
            color: var(--vscode-descriptionForeground);
            font-size: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .checkbox-group input {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="minecraft-header">
            <h1 class="minecraft-title">🎮 Create Minecraft Plugin</h1>
        </div>

        <!-- Project Details -->
        <div class="form-section">
            <div class="section-title">
                <span>📦</span> Project Details
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="required">Project Name:</label>
                    <div class="input-group">
                        <span class="input-icon">📄</span>
                        <div class="input-with-icon">
                            <input type="text" id="projectName" placeholder="MyAwesomePlugin" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="required">Package Name:</label>
                    <div class="input-group">
                        <span class="input-icon">📦</span>
                        <div class="input-with-icon">
                            <input type="text" id="packageName" placeholder="com.example.plugin" required>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Plugin Info -->
        <div class="form-section">
            <div class="section-title">
                <span>ℹ️</span> Plugin Information
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="required">Version:</label>
                    <div class="input-group">
                        <span class="input-icon">🏷️</span>
                        <div class="input-with-icon">
                            <input type="text" id="pluginVersion" value="1.0.0-SNAPSHOT" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="required">Author:</label>
                    <div class="input-group">
                        <span class="input-icon">👤</span>
                        <div class="input-with-icon">
                            <input type="text" id="authorName" placeholder="Your Name" required>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Website (optional):</label>
                <div class="input-group">
                    <span class="input-icon">🌐</span>
                    <div class="input-with-icon">
                        <input type="text" id="website" placeholder="https://example.com">
                    </div>
                </div>
            </div>
        </div>

        <!-- Technical Settings -->
        <div class="form-section">
            <div class="section-title">
                <span>⚙️</span> Technical Settings
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Minecraft Version:</label>
                    <div class="input-group">
                        <span class="input-icon">🎮</span>
                        <div class="input-with-icon">
                            <select id="minecraftVersion">
                                <!-- Versions will be populated dynamically -->
                                <option value="1.21">1.21</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>API Version:</label>
                    <div class="input-group">
                        <span class="input-icon">🔧</span>
                        <div class="input-with-icon">
                            <select id="apiVersion">
                                <option value="1.21">1.21</option>
                                <option value="1.20">1.20</option>
                                <option value="1.19">1.19</option>
                                <option value="1.18">1.18</option>
                                <option value="1.17">1.17</option>
                                <option value="1.16">1.16</option>
                                <option value="1.15">1.15</option>
                                <option value="1.14">1.14</option>
                                <option value="1.13">1.13</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Java Version:</label>
                    <div class="input-group">
                        <span class="input-icon">☕</span>
                        <div class="input-with-icon">
                            <select id="javaVersion">
                                <option value="21">Java 21</option>
                                <option value="17">Java 17</option>
                                <option value="16">Java 16</option>
                                <option value="11">Java 11</option>
                                <option value="8">Java 8</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>API Type:</label>
                    <div class="input-group">
                        <span class="input-icon">🛠️</span>
                        <div class="input-with-icon">
                            <select id="apiType">
                                <option value="spigot">Spigot</option>
                                <option value="paper">Paper</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Language:</label>
                    <div class="input-group">
                        <span class="input-icon">💻</span>
                        <div class="input-with-icon">
                            <select id="language">
                                <option value="java">Java</option>
                                <option value="kotlin">Kotlin</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Build System:</label>
                    <div class="input-group">
                        <span class="input-icon">🏗️</span>
                        <div class="input-with-icon">
                            <select id="buildSystem">
                                <option value="maven">Maven</option>
                                <option value="gradle">Gradle (Groovy)</option>
                                <option value="gradle-kotlin">Gradle (Kotlin DSL)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <label class="checkbox-group">
                <input type="checkbox" id="useLombok">
                <span>Enable Lombok support (Java only)</span>
            </label>
        </div>

        <!-- Dependencies -->
        <div class="form-section">
            <div class="section-title">
                <span>🔗</span> Dependencies
            </div>
            <div class="form-group">
                <label>Dependencies:</label>
                <div class="input-group">
                    <span class="input-icon">⚡</span>
                    <div class="input-with-icon">
                        <input type="text" id="dependencies" placeholder="Vault, WorldEdit">
                    </div>
                </div>
                <small>Comma-separated list of required plugins</small>
            </div>
            <div class="form-group">
                <label>Soft Dependencies:</label>
                <div class="input-group">
                    <span class="input-icon">🔌</span>
                    <div class="input-with-icon">
                        <input type="text" id="softDependencies" placeholder="PlaceholderAPI">
                    </div>
                </div>
                <small>Comma-separated list of optional plugins</small>
            </div>
        </div>

        <button onclick="createPlugin()">🚀 Create Plugin Project</button>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        // Disable Lombok checkbox if language is Kotlin
        const languageSelect = document.getElementById('language');
        const lombokCheckbox = document.getElementById('useLombok');

        languageSelect.addEventListener('change', () => {
            if (languageSelect.value === 'kotlin') {
                lombokCheckbox.checked = false;
                lombokCheckbox.disabled = true;
                lombokCheckbox.parentElement.style.opacity = '0.5';
            } else {
                lombokCheckbox.disabled = false;
                lombokCheckbox.parentElement.style.opacity = '1';
            }
        });

        function createPlugin() {
            const requiredFields = ['projectName', 'packageName', 'pluginVersion', 'authorName'];
            for (const field of requiredFields) {
                const element = document.getElementById(field);
                if (!element.value) {
                    alert(`Please fill in the ${field.replace(/([A-Z])/g, ' $1').toLowerCase()}`);
                    return;
                }
            }

            const language = document.getElementById('language').value;
            const useLombok = document.getElementById('useLombok').checked;

            if (useLombok && language !== 'java') {
                alert('Lombok is only supported for Java projects.');
                return;
            }

            const data = {
                projectName: document.getElementById('projectName').value,
                packageName: document.getElementById('packageName').value,
                pluginVersion: document.getElementById('pluginVersion').value,
                authorName: document.getElementById('authorName').value,
                website: document.getElementById('website').value || 'https://example.com',
                minecraftVersion: document.getElementById('minecraftVersion').value,
                apiVersion: document.getElementById('apiVersion').value,
                javaVersion: document.getElementById('javaVersion').value,
                apiType: document.getElementById('apiType').value,
                language: document.getElementById('language').value,
                buildSystem: document.getElementById('buildSystem').value,
                useLombok: document.getElementById('useLombok').checked,
                dependencies: document.getElementById('dependencies').value,
                softDependencies: document.getElementById('softDependencies').value
            };

            vscode.postMessage({
                command: 'createPlugin',
                data: data
            });
        }
    </script>
</body>
</html>
